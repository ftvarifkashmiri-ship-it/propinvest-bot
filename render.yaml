services:
  - type: web
    name: propinvest-bot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: propinvest-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false

databases:
  - name: propinvest-db
    plan: free
    databaseName: propinvest
    user: propinvest
